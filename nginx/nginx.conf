events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream http://api-gateway:8080;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 9001 http2;
        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream grpc://catalogo-productos:9001;
            grpc_pass $upstream;
        }
    }

    server {
        listen 9003 http2;
        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream grpc://catalogo-defectos:9003;
            grpc_pass $upstream;
        }
    }

    server {
        listen 9010 http2;
        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream grpc://servicio-inspecciones:9010;
            grpc_pass $upstream;
        }
    }

    server {
        listen 50051 http2;
        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream grpc://servicio-cambio:50051;
            grpc_pass $upstream;
        }
    }
}